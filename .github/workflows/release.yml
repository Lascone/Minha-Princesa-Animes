name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Stage FFmpeg for bundle
        run: npm run stage-ffmpeg

      - name: Normalize updater signing key
        shell: pwsh
        env:
          RAW_TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          $raw = "$env:RAW_TAURI_SIGNING_PRIVATE_KEY".Trim()
          if ([string]::IsNullOrWhiteSpace($raw)) {
            throw "TAURI_SIGNING_PRIVATE_KEY secret is empty."
          }

          $keyCandidates = @($raw)
          try {
            $decoded = [Text.Encoding]::UTF8.GetString([Convert]::FromBase64String($raw))
            if (-not [string]::IsNullOrWhiteSpace($decoded)) {
              $keyCandidates += $decoded
            }
          } catch {
            # The secret might already be plain minisign key text.
          }

          $normalizedKey = $null
          foreach ($candidate in $keyCandidates) {
            if ($candidate -match "^\s*untrusted comment:") {
              $normalizedKey = $candidate -replace "`r`n", "`n"
              break
            }
          }

          if ($null -eq $normalizedKey) {
            throw "TAURI_SIGNING_PRIVATE_KEY must be minisign key text or base64-encoded minisign key text."
          }

          $keyPath = Join-Path $env:RUNNER_TEMP "tauri-signing-private.key"
          Set-Content -Path $keyPath -Value $normalizedKey -Encoding utf8NoBOM -NoNewline
          "TAURI_SIGNING_PRIVATE_KEY=$keyPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: Minha Princesa Animes v__VERSION__
          releaseBody: |
            ## Minha Princesa Animes v__VERSION__

            Instale o `.exe` (NSIS) ou `.msi` abaixo. O app instalado verifica atualizações automaticamente via GitHub Releases.

            ### Notas
            Veja o changelog no repositório.
          releaseDraft: true
          prerelease: false
          args: --target x86_64-pc-windows-msvc
