name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Stage FFmpeg for bundle
        run: npm run stage-ffmpeg

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          CI: true
        with:
          tagName: v__VERSION__
          releaseName: Minha Princesa Animes v__VERSION__
          releaseBody: |
            ## Minha Princesa Animes v__VERSION__

            ### Novidades
            - Player cinema estável: troca de episódio sem tela preta ao pular ou usar auto-próximo
            - Visual rosa degradê no player, loading e continuar assistindo
            - Retomar de onde parou mais confiável na biblioteca
            - Barra de título escura no Windows alinhada ao tema do app
            - Melhorias de estabilidade no ciclo de vida do Plyr

            Instale o `.exe` (NSIS) ou `.msi` abaixo. O app verifica atualizações automaticamente via GitHub Releases.
          releaseDraft: false
          prerelease: false
          args: --target x86_64-pc-windows-msvc --ci
